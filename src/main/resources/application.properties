spring.application.name=projekt_sklep

# Polaczenie z PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sklep}
spring.datasource.username=${DB_USER:app_identity}
spring.datasource.password=${DB_PASSWORD:App_2026!}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
