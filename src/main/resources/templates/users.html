<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
    <title>Użytkownicy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Użytkownicy</span>
            <span class="topbar-user" sec:authentication="name"></span>
        </div>

        <div class="content">

            <div class="page-header">
                <h2>Lista użytkowników</h2>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imię</th>
                        <th>Nazwisko</th>
                        <th>Login</th>
                        <th>Wiek</th>
                        <th>Rola</th>
                        <th>Akcje</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.imie}"></td>
                        <td th:text="${user.nazwisko}"></td>
                        <td th:text="${user.login}"></td>
                        <td th:text="${user.wiek}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.rola == 'ADMIN'} ? 'badge-admin' : (${user.rola == 'EMPLOYEE'} ? 'badge-employee' : 'badge-user')"
                                  th:text="${user.rola}">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/users/editRole/{id}(id=${user.id})}" class="btn btn-secondary btn-sm">Zmień rolę</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>
</body>
</html>
