<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
    <title>Kategorie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Kategorie</span>
            <span class="topbar-user" sec:authentication="name"></span>
        </div>

        <div class="content">
            <div class="page-header">
                <h2>Lista kategorii</h2>
                <a href="/categories/add" class="btn btn-primary">+ Dodaj kategorię</a>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nazwa</th>
                        <th>Akcje</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="category : ${categories}">
                        <td th:text="${category.id}"></td>
                        <td th:text="${category.nazwa}"></td>
                        <td>
                            <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-secondary btn-sm">Edytuj</a>
                            <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-danger btn-sm">Usuń</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
