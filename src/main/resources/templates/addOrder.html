<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
    <title>Dodaj zamówienie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Dodaj zamówienie</span>
            <span class="topbar-user" sec:authentication="name"></span>
        </div>

        <div class="content">
            <div class="form-card">
                <p style="font-size:13px;color:#71717a;margin-bottom:16px;">
                    Utwórz zamówienie — po zapisaniu przejdziesz do edycji, gdzie dodasz produkty.
                </p>
                <form th:action="@{/orders/save}" method="post">

                    <div class="form-group">
                        <label>Data zamówienia</label>
                        <input type="date" name="dataZamowienia"
                               th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select name="status">
                            <option value="NOWE">NOWE</option>
                            <option value="W_REALIZACJI">W REALIZACJI</option>
                            <option value="ZAKONCZONE">ZAKOŃCZONE</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Utwórz i dodaj produkty →</button>
                        <a href="/orders" class="btn btn-secondary">Anuluj</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
