<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
    <title>Edytuj produkt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Edytuj produkt</span>
            <span class="topbar-user" sec:authentication="name"></span>
        </div>

        <div class="content">
            <div class="form-card">
                <form th:action="@{/products/update}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label>Nazwa</label>
                        <input type="text" th:field="*{nazwa}">
                    </div>

                    <div class="form-group">
                        <label>Opis</label>
                        <input type="text" th:field="*{opis}">
                    </div>

                    <div class="form-group">
                        <label>Producent</label>
                        <input type="text" th:field="*{producent}">
                    </div>

                    <div class="form-group">
                        <label>Cena (zł)</label>
                        <input type="number" step="0.01" min="0.01" th:field="*{cena}">
                    </div>

                    <div class="form-group">
                        <label>Ilość</label>
                        <input type="number" th:field="*{ilosc}">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                        <a href="/products" class="btn btn-secondary">Anuluj</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
