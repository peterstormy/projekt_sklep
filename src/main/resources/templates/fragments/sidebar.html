<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<body>
<nav th:fragment="sidebar" class="sidebar">

    <div class="sidebar-logo">
        <div class="logo-title"><span aria-hidden="true">&#128187;</span> Sklep</div>
        <div class="logo-sub" sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">System zarządzania</div>
        <div class="logo-sub" sec:authorize="hasRole('USER')">Sklep komputerowy</div>
    </div>

    <div class="sidebar-nav">
        <a href="/"><span class="nav-icon" aria-hidden="true">&#127968;</span> Strona główna</a>
        <a href="/products"><span class="nav-icon" aria-hidden="true">&#128230;</span> Produkty</a>
        <a href="/categories"><span class="nav-icon" aria-hidden="true">&#127991;</span> Kategorie</a>
        <a href="/orders"><span class="nav-icon" aria-hidden="true">&#128203;</span> Zamówienia</a>
        <a sec:authorize="hasRole('USER')" href="/cart"><span class="nav-icon" aria-hidden="true">&#128717;</span> Koszyk</a>
        <a sec:authorize="hasRole('ADMIN')" href="/users"><span class="nav-icon" aria-hidden="true">&#128101;</span> Użytkownicy</a>
        <a href="/profile"><span class="nav-icon" aria-hidden="true">&#128100;</span> Profil</a>
    </div>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            Zalogowany: <span sec:authentication="name">użytkownik</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout"><span aria-hidden="true">&#x2192;</span> Wyloguj się</button>
        </form>
    </div>

</nav>
</body>
</html>
