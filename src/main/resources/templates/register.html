<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rejestracja</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <h1>Rejestracja</h1>
        <p class="auth-sub">Utwórz nowe konto</p>

        <form th:action="@{/register/save}" th:object="${user}" method="post">

            <div class="form-group">
                <label>Imię</label>
                <input type="text" th:field="*{imie}" placeholder="Wpisz imię">
            </div>

            <div class="form-group">
                <label>Nazwisko</label>
                <input type="text" th:field="*{nazwisko}" placeholder="Wpisz nazwisko">
            </div>

            <div class="form-group">
                <label>Login</label>
                <input type="text" th:field="*{login}" placeholder="Wpisz login">
            </div>

            <div class="form-group">
                <label>Hasło</label>
                <input type="password" th:field="*{haslo}" placeholder="Wpisz hasło">
            </div>

            <div class="form-group">
                <label>Wiek</label>
                <input type="number" th:field="*{wiek}" placeholder="Wpisz wiek" min="1" max="120">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                Zarejestruj się
            </button>
        </form>

        <div class="auth-footer">
            <a href="/login">Masz już konto? Zaloguj się</a>
        </div>
    </div>
</div>
</body>
</html>
