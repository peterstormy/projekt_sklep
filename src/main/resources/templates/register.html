<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <title>Rejestracja</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <h1>Rejestracja</h1>
        <p class="auth-sub">Utwórz nowe konto</p>

        <form th:action="@{/register/save}" th:object="${user}" method="post">

            <div class="form-group">
                <label for="imie">Imię</label>
                <input type="text" th:field="*{imie}" placeholder="Wpisz imię">
                <div class="form-error" role="alert" th:if="${#fields.hasErrors('imie')}" th:errors="*{imie}"></div>
            </div>

            <div class="form-group">
                <label for="nazwisko">Nazwisko</label>
                <input type="text" th:field="*{nazwisko}" placeholder="Wpisz nazwisko">
                <div class="form-error" role="alert" th:if="${#fields.hasErrors('nazwisko')}" th:errors="*{nazwisko}"></div>
            </div>

            <div class="form-group">
                <label for="login">Login (małe litery i cyfry)</label>
                <input type="text" th:field="*{login}" placeholder="Wpisz login">
                <div class="form-error" role="alert" th:if="${#fields.hasErrors('login')}" th:errors="*{login}"></div>
            </div>

            <div class="form-group">
                <label for="haslo">Hasło (min. 5 znaków)</label>
                <input type="password" th:field="*{haslo}" placeholder="Wpisz hasło">
                <div class="form-error" role="alert" th:if="${#fields.hasErrors('haslo')}" th:errors="*{haslo}"></div>
            </div>

            <div class="form-group">
                <label for="wiek">Wiek (min. 18 lat)</label>
                <input type="number" th:field="*{wiek}" placeholder="Wpisz wiek" min="18" max="120">
                <div class="form-error" role="alert" th:if="${#fields.hasErrors('wiek')}" th:errors="*{wiek}"></div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                Zarejestruj się
            </button>
        </form>

        <div class="auth-footer">
            <a href="/login">Masz już konto? Zaloguj się</a>
        </div>
    </div>
</div>
</body>
</html>
