<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
    <title>Produkty</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        th a { text-decoration: none; color: inherit; }
        th a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<h1>Lista produktów</h1>

<div sec:authorize="hasAnyRole('ADMIN', 'EMPLOYEE')">
    <a href="/products/add">Dodaj produkt</a>
    <br><br>
</div>

<h3>Filtr daty (od)</h3>

<form action="/products" method="get">
    <input type="date" name="data">
    <input type="hidden" name="categoryId" th:if="${categoryId != null}" th:value="${categoryId}">
    <button type="submit">Filtruj</button>
    <a th:if="${data != null}" href="/products">Wyczyść</a>
</form>

<br>

<h3>Filtr kategorii</h3>

<a href="/products">Wszystkie</a>
<br><br>

<div th:each="category : ${categories}">
    <a th:href="@{/products(categoryId=${category.id})}"
       th:text="${category.nazwa}">
    </a>
    <br>
</div>

<br><br>

<table border="1">

    <tr>
        <!-- ID -->
        <th>
            <a th:href="${sortField == 'id' && sortDir == 'asc'}
                        ? @{/products(sortField='id',sortDir='desc',categoryId=${categoryId},data=${data})}
                        : (${sortField == 'id' && sortDir == 'desc'}
                           ? @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})}
                           : @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})})">
                ID
                <span th:if="${sortField == 'id' && sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'id' && sortDir == 'desc'}">↓</span>
            </a>
        </th>

        <!-- Nazwa -->
        <th>
            <a th:href="${sortField == 'nazwa' && sortDir == 'asc'}
                        ? @{/products(sortField='nazwa',sortDir='desc',categoryId=${categoryId},data=${data})}
                        : (${sortField == 'nazwa' && sortDir == 'desc'}
                           ? @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})}
                           : @{/products(sortField='nazwa',sortDir='asc',categoryId=${categoryId},data=${data})})">
                Nazwa
                <span th:if="${sortField == 'nazwa' && sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'nazwa' && sortDir == 'desc'}">↓</span>
            </a>
        </th>

        <!-- Producent -->
        <th>
            <a th:href="${sortField == 'producent' && sortDir == 'asc'}
                        ? @{/products(sortField='producent',sortDir='desc',categoryId=${categoryId},data=${data})}
                        : (${sortField == 'producent' && sortDir == 'desc'}
                           ? @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})}
                           : @{/products(sortField='producent',sortDir='asc',categoryId=${categoryId},data=${data})})">
                Producent
                <span th:if="${sortField == 'producent' && sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'producent' && sortDir == 'desc'}">↓</span>
            </a>
        </th>

        <!-- Cena -->
        <th>
            <a th:href="${sortField == 'cena' && sortDir == 'asc'}
                        ? @{/products(sortField='cena',sortDir='desc',categoryId=${categoryId},data=${data})}
                        : (${sortField == 'cena' && sortDir == 'desc'}
                           ? @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})}
                           : @{/products(sortField='cena',sortDir='asc',categoryId=${categoryId},data=${data})})">
                Cena
                <span th:if="${sortField == 'cena' && sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'cena' && sortDir == 'desc'}">↓</span>
            </a>
        </th>

        <!-- Ilość -->
        <th>
            <a th:href="${sortField == 'ilosc' && sortDir == 'asc'}
                        ? @{/products(sortField='ilosc',sortDir='desc',categoryId=${categoryId},data=${data})}
                        : (${sortField == 'ilosc' && sortDir == 'desc'}
                           ? @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})}
                           : @{/products(sortField='ilosc',sortDir='asc',categoryId=${categoryId},data=${data})})">
                Ilość
                <span th:if="${sortField == 'ilosc' && sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'ilosc' && sortDir == 'desc'}">↓</span>
            </a>
        </th>

        <!-- Data dodania -->
        <th>
            <a th:href="${sortField == 'dataDodania' && sortDir == 'asc'}
                        ? @{/products(sortField='dataDodania',sortDir='desc',categoryId=${categoryId},data=${data})}
                        : (${sortField == 'dataDodania' && sortDir == 'desc'}
                           ? @{/products(sortField='id',sortDir='asc',categoryId=${categoryId},data=${data})}
                           : @{/products(sortField='dataDodania',sortDir='asc',categoryId=${categoryId},data=${data})})">
                Data dodania
                <span th:if="${sortField == 'dataDodania' && sortDir == 'asc'}">↑</span>
                <span th:if="${sortField == 'dataDodania' && sortDir == 'desc'}">↓</span>
            </a>
        </th>

        <th>Kategoria</th>
        <th sec:authorize="hasAnyRole('ADMIN', 'EMPLOYEE')">Edytuj</th>
        <th sec:authorize="hasAnyRole('ADMIN', 'EMPLOYEE')">Usuń</th>
    </tr>

    <tr th:each="product : ${products}">

        <td th:text="${product.id}"></td>

        <td>
            <a th:href="@{/products/{id}(id=${product.id})}"
               th:text="${product.nazwa}">
            </a>
        </td>

        <td th:text="${product.producent}"></td>

        <td th:text="${product.cena}"></td>

        <td th:text="${product.ilosc}"></td>

        <td th:text="${product.dataDodania}"></td>

        <td th:text="${product.category != null ? product.category.nazwa : 'Brak kategorii'}"></td>

        <td sec:authorize="hasAnyRole('ADMIN', 'EMPLOYEE')">
            <a th:href="@{/products/edit/{id}(id=${product.id})}">Edytuj</a>
        </td>

        <td sec:authorize="hasAnyRole('ADMIN', 'EMPLOYEE')">
            <a th:href="@{/products/delete/{id}(id=${product.id})}">Usuń</a>
        </td>

    </tr>

</table>

<br><br>

<a href="/">Strona główna</a>

</body>
</html>
