<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6"
      lang="pl">
<head>
    <title>Edytuj kategorię</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Edytuj kategorię</span>
            <span class="topbar-user" sec:authentication="name"></span>
        </div>

        <main class="content">
            <div class="form-card">
                <form th:action="@{/categories/update}" th:object="${category}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label for="nazwa">Nazwa (małe litery, 3–20 znaków)</label>
                        <input type="text" th:field="*{nazwa}">
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('nazwa')}" th:errors="*{nazwa}"></div>
                    </div>

                    <div class="form-group">
                        <label for="opis">Opis</label>
                        <textarea th:field="*{opis}" rows="3" style="width:100%;resize:vertical;"></textarea>
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('opis')}" th:errors="*{opis}"></div>
                    </div>

                    <div class="form-group">
                        <label for="dataDodania">Data dodania</label>
                        <input type="date" th:field="*{dataDodania}">
                    </div>

                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" th:field="*{aktywna}" style="width:auto;">
                            Kategoria aktywna
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                        <a href="/categories" class="btn btn-secondary">Anuluj</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

</div>
</body>
</html>
