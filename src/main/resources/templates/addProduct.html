<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6"
      lang="pl">
<head>
    <title>Dodaj produkt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">Dodaj produkt</span>
            <span class="topbar-user" sec:authentication="name"></span>
        </div>

        <main class="content">
            <div class="form-card">
                <form th:action="@{/products/save}" th:object="${product}" method="post">

                    <div class="form-group">
                        <label for="nazwa">Nazwa</label>
                        <input type="text" th:field="*{nazwa}" placeholder="Nazwa produktu">
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('nazwa')}" th:errors="*{nazwa}"></div>
                    </div>

                    <div class="form-group">
                        <label for="opis">Opis</label>
                        <input type="text" th:field="*{opis}" placeholder="Opis produktu">
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('opis')}" th:errors="*{opis}"></div>
                    </div>

                    <div class="form-group">
                        <label for="producent">Producent</label>
                        <input type="text" th:field="*{producent}" placeholder="Nazwa producenta">
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('producent')}" th:errors="*{producent}"></div>
                    </div>

                    <div class="form-group">
                        <label for="cena">Cena (zł)</label>
                        <input type="number" step="0.01" min="0.01" th:field="*{cena}" placeholder="0.00">
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('cena')}" th:errors="*{cena}"></div>
                    </div>

                    <div class="form-group">
                        <label for="ilosc">Ilość</label>
                        <input type="number" th:field="*{ilosc}" placeholder="0">
                        <div class="form-error" role="alert" th:if="${#fields.hasErrors('ilosc')}" th:errors="*{ilosc}"></div>
                    </div>

                    <div class="form-group">
                        <label for="category">Kategoria</label>
                        <select th:field="*{category}">
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.nazwa}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" th:field="*{publiczny}" style="width:auto;">
                            Udostępnij publicznie
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Dodaj produkt</button>
                        <a href="/products" class="btn btn-secondary">Anuluj</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

</div>
</body>
</html>
