<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <title>Logowanie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <h1>&#128187; Sklep</h1>
        <p class="auth-sub">Zaloguj się do systemu zarządzania</p>

        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label for="username">Login</label>
                <input type="text" id="username" name="username" placeholder="Wpisz login">
            </div>

            <div class="form-group">
                <label for="password">Hasło</label>
                <input type="password" id="password" name="password" placeholder="Wpisz hasło">
            </div>

            <div th:if="${param.error}" role="alert" style="color:#dc2626;font-size:13px;margin-bottom:12px;">
                Nieprawidłowy login lub hasło.
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                Zaloguj się
            </button>
        </form>

        <div class="auth-footer">
            <a href="/register">Nie masz konta? Zarejestruj się</a>
        </div>

        <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f4f4f5;font-size:12px;color:#a1a1aa;">
            Konta testowe: admin/admin &nbsp;·&nbsp; user/user &nbsp;·&nbsp; employee/employee
        </div>
    </div>
</div>
</body>
</html>
